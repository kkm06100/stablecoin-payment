<!doctype html><html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Stablecoin Payment Wireframe</title><link rel="stylesheet" href="./styles.css"/></head><body><main class="shell"><header class="topbar"><div><span class="eyebrow">STABLECOIN PAYMENT</span><h1>QR 결제 흐름</h1></div><span class="badge">WIREFRAME</span></header><section class="flow-map"><div class="flow-node active" data-step="merchant"><b>01</b><span>가맹점</span><small>결제 생성</small></div><i>→</i><div class="flow-node" data-step="qr"><b>02</b><span>QR 발급</span><small>5분 TTL</small></div><i>→</i><div class="flow-node" data-step="customer"><b>03</b><span>고객 스캔</span><small>결제 확인</small></div><i>→</i><div class="flow-node" data-step="done"><b>04</b><span>송금 완료</span><small>REST transfer</small></div></section><section class="workspace"><div class="phone card"><div class="phone-head"><span>고객 앱</span><span class="dot"></span></div><div id="screen" class="screen"></div></div><aside class="card inspector"><span class="eyebrow">LIVE FLOW</span><h2 id="step-title"></h2><p id="step-copy"></p><div class="request"><span>API REQUEST</span><code id="api-call"></code></div><button id="next">다음 단계</button><button id="reset" class="ghost">처음으로</button></aside></section><section class="architecture card"><div><span class="eyebrow">SERVICE BOUNDARY</span><h2>Payment은 결제 오케스트레이터</h2></div><div class="lane"><span>Payment API</span><b>REST + 서명</b><span>stablecoin-transaction</span><b>Ledger / Chain</b></div></section></main><script src="./app.js"></script></body></html>
