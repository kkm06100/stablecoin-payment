<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Stablecoin Payment Console</title>
</head>
<body>
  <h1>Stablecoin Payment Console</h1>
  <p>기능 검증용 최소 UI</p>
  <label>API <input id="baseUrl" value="http://localhost:8081" size="32"></label>
  <button id="clearLog">로그 지우기</button>
  <p id="status">대기 중</p>

  <h2>로그인</h2>
  <input id="email" placeholder="email">
  <input id="password" type="password" value="password123" placeholder="password">
  <button id="signup">회원가입</button><button id="login">로그인</button>
  <pre id="session"></pre>

  <h2>가맹점 결제</h2>
  <input id="merchantId" placeholder="merchant id">
  <input id="orderId" placeholder="order id" value="demo-order">
  <input id="amount" type="number" value="1" min="1">
  <input id="description" value="Demo payment">
  <button id="createPayment">결제 생성</button>
  <button id="lookupQr">QR 조회</button><button id="confirmQr">QR 결제 승인</button>
  <button id="cancelPayment">결제 취소</button>
  <pre id="payment"></pre>
  <canvas id="qrCanvas" width="220" height="220"></canvas>

  <h2>고객 결제내역</h2>
  <input id="historyLimit" type="number" value="20" min="1" max="200">
  <button id="myPayments">첫 페이지</button><button id="nextPayments">다음 페이지</button>
  <input id="paymentId" placeholder="payment id">
  <button id="paymentDetail">상세 조회</button>
  <pre id="history"></pre><span id="historyCursor"></span>

  <h2>지갑</h2>
  <button id="wallet">지갑 조회</button><button id="copyAddress">주소 복사</button>
  <pre id="walletResult"></pre>

  <h2>송금</h2>
  <input id="destinationWalletId" placeholder="destination wallet id" size="38">
  <input id="transferToken" value="USDC-test">
  <input id="transferAmount" type="number" value="1" min="1">
  <input id="memo" value="demo transfer">
  <button id="sendTransfer">송금</button>
  <input id="transferId" placeholder="transfer id" size="38"><button id="transferDetail">송금 상세</button>
  <pre id="transferResult"></pre>

  <h2>API 로그</h2><pre id="log"></pre>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
