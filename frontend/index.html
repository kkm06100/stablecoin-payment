<!doctype html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Payment Scenario v2</title></head>
<body>
  <h1>Stablecoin Payment · Scenario v2</h1>
  <p>실제 payment API를 호출하는 전체 결제 시나리오</p>
  <label>Payment API <input id="baseUrl" value="http://localhost:8081"></label>
  <button id="runScenario">전체 시나리오 실행</button>
  <button id="prepareAccounts">테스트 계정 준비(회원가입)</button>
  <button id="clearLog">로그 지우기</button>
  <p id="status">대기 중</p>

  <h2>로그인 계정</h2>
  <label>가맹점 이메일 <input id="merchantEmail" placeholder="merchant@example.com"></label>
  <label>비밀번호 <input id="merchantPassword" type="password" value="password123"></label>
  <label>고객 이메일 <input id="customerEmail" placeholder="customer@example.com"></label>
  <label>비밀번호 <input id="customerPassword" type="password" value="password123"></label>

  <h2>시나리오 상태</h2>
  <ol id="steps">
    <li data-step="merchant-signup">가맹점 회원가입</li>
    <li data-step="merchant-create">가맹점 생성</li>
    <li data-step="payment-create">결제 생성 및 QR 발급</li>
    <li data-step="customer-signup">고객 회원가입</li>
    <li data-step="qr-lookup">고객 QR 조회</li>
    <li data-step="payment-confirm">고객 결제 확정</li>
  </ol>

  <h2>QR</h2>
  <canvas id="qrCanvas" width="220" height="220"></canvas>
  <pre id="qrPayload"></pre>

  <h2>API 로그</h2>
  <pre id="log"></pre>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
