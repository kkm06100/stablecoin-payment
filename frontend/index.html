<!doctype html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Payment API Demo</title></head>
<body>
  <h1>Stablecoin Payment API Demo</h1>
  <label>Payment API <input id="baseUrl" value="http://localhost:8081"></label>
  <p id="status">대기 중</p>
  <hr>
  <h2>1. 회원가입</h2>
  <input id="email" value="demo@example.com" placeholder="email">
  <input id="password" value="password123" placeholder="password" type="password">
  <input id="displayName" value="Demo User" placeholder="display name">
  <button id="signup">회원가입</button>
  <button id="login">로그인</button>
  <hr>
  <h2>2. 가맹점 생성</h2>
  <button id="createMerchant">가맹점 생성</button>
  <pre id="merchantResult"></pre>
  <hr>
  <h2>3. 결제 생성</h2>
  <input id="orderId" value="demo-order-1" placeholder="order id">
  <input id="amount" value="1" placeholder="amount" type="number">
  <input id="token" value="USDC-test" placeholder="token">
  <button id="createPayment">결제 생성</button>
  <pre id="paymentResult"></pre>
  <hr>
  <h2>4. QR 조회 / 고객 결제</h2>
  <input id="qrToken" placeholder="QR token 또는 payload 마지막 값">
  <div><canvas id="qrCanvas" width="220" height="220"></canvas></div>
  <pre id="qrPayload"></pre>
  <button id="lookupQr">QR 조회</button>
  <button id="confirmPayment">결제 확정</button>
  <pre id="qrResult"></pre>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
