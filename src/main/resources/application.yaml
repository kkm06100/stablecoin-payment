server:
  port: 8081

spring:
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:postgresql://localhost:5432/payment}
    username: stablecoin
    password: stablecoin
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.default_schema: public
      hibernate.show_sql: true
      hibernate.format_sql: true
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

bao:
  url: ${BAO_URL:http://localhost:8200}
  token: ${BAO_TOKEN:dev-root}
  transit-mount: ${BAO_TRANSIT_MOUNT:transit}
  operator-key-label: ${BAO_OPERATOR_KEY_LABEL:operator-auth-key}

stablecoin:
  operator-id: operator-default
  default-chain: solana

user-auth:
  issuer: ${USER_AUTH_ISSUER:stablecoin-transaction}
  jwt-secret: ${USER_AUTH_JWT_SECRET:stablecoin-development-jwt-secret-change-me}
  access-token-ttl: ${USER_AUTH_ACCESS_TOKEN_TTL:15m}
  refresh-token-ttl: ${USER_AUTH_REFRESH_TOKEN_TTL:30d}

payment:
  qr-secret: ${PAYMENT_QR_SECRET:stablecoin-development-qr-secret-change-me}
  expiry-fixed-delay-ms: ${PAYMENT_EXPIRY_FIXED_DELAY_MS:60000}

stablecoin-transaction:
  base-url: ${STABLECOIN_TRANSACTION_URL:http://localhost:8090}
  usdc-test-mint: ${STABLECOIN_USDC_TEST_MINT:Cvk2EfwzeNcv9TxEFfXuExr2fq11BzHjyTt91gMRBbjj}

solana:
  rpc-url: ${SOLANA_RPC_URL:http://localhost:8899}

chain:
  poll:
    fixed-delay-ms: 5000
    limit: 50
  # Map SPL mint (Base58) -> token symbol stored in chain.deposits / ledger.
  tokens:
    Cvk2EfwzeNcv9TxEFfXuExr2fq11BzHjyTt91gMRBbjj: USDC-test
  send:
    confirm-timeout-ms: 30000
    confirm-poll-interval-ms: 1000
    gas-payer-min-lamports: 1000000000
  provisioning:
    omnibus-ata-mints:
      - mint: ${STABLECOIN_USDC_TEST_MINT:Cvk2EfwzeNcv9TxEFfXuExr2fq11BzHjyTt91gMRBbjj}
        decimals: 6

approver:
  amount-limit:
    max-amount: 10000000

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    org.hibernate.type.descriptor.sql: TRACE
